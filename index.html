<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Passipaikka</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <!-- ── Crawler & AI agent directives ────────────────────────────── -->
  <meta name="robots"    content="noindex, nofollow, nosnippet, noarchive, noimageindex, notranslate">
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <meta name="bingbot"   content="noindex, nofollow, noarchive, nosnippet">

  <!--
    Security note: HTTP headers (CSP, X-Frame-Options, etc.) are most effective
    when served at the network layer. GitHub Pages does not support custom headers,
    so the meta-equivalent equivalents below provide best-effort mitigation only.
    Consider fronting with Cloudflare or another proxy for full header control.
  -->

  <!-- Content-Security-Policy: tightened, no inline scripts, no framing, no mixed content -->
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; upgrade-insecure-requests;">
  <!-- MIME sniffing protection -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <!-- No referrer leaked on any navigation -->
  <meta name="referrer" content="no-referrer">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Raleway:wght@300;700;900&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --dark:    #0d1a0f;
      --forest:  #1a2e1c;
      --mid:     #2c4a2e;
      --accent:  #4a7c4e;
      --muted:   #7aab7e;
      --light:   #d6e8d7;
      --gold:    #c8a84b;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background-color: var(--dark);
      font-family: 'Raleway', 'Segoe UI', sans-serif;
      color: var(--light);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── Night sky gradient ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, #1e3a22 0%, #0d1a0f 65%);
      z-index: 0;
    }

    /* ── Stars ── */
    .stars {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }
    .stars span {
      position: absolute;
      display: block;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: rgba(214, 232, 215, 0.6);
      animation: twinkle var(--d, 4s) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50%       { opacity: 1; }
    }

    /* ── Forest silhouette ── */
    .treeline {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 300px;
      z-index: 2;
      pointer-events: none;
    }

    /* ── Main content ── */
    .content {
      position: relative;
      z-index: 3;
      text-align: center;
      padding: 2rem;
      user-select: none;
    }

    .logo-mark {
      display: block;
      margin: 0 auto 2rem;
      width: 72px;
      height: 72px;
      opacity: 0.85;
      cursor: pointer;
    }

    /* ── Easter egg overlay ── */
    #egg {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,0.45);
      animation: eggFade 2.4s ease forwards;
    }
    #egg.active { display: block; }
    #egg img {
      position: absolute;
      width: 280px;
      border-radius: 10px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
      transform: translate(-50%, -50%);
    }
    @keyframes eggFade {
      0%   { opacity: 0; }
      15%  { opacity: 1; }
      75%  { opacity: 1; }
      100% { opacity: 0; }
    }

    h1 {
      font-size: clamp(3.5rem, 10vw, 7rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      color: var(--light);
      text-shadow: 0 0 60px rgba(74, 124, 78, 0.5);
      line-height: 1;
    }

    .tagline {
      margin-top: 1.5rem;
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      font-weight: 300;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .divider {
      width: 80px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--muted), transparent);
      margin: 2rem auto;
    }

    .subtitle {
      font-size: clamp(0.85rem, 2vw, 1rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      color: var(--light);
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- Stars -->
  <div class="stars" aria-hidden="true" id="stars"></div>

  <!-- Forest silhouette (paths built by JS for full-width stepped detail) -->
  <svg class="treeline" id="treeline-svg" viewBox="0 0 1440 300" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path id="tree-back"  fill="#4a7a4e"/>
    <path id="tree-mid2"  fill="#3a6040"/>
    <path id="tree-mid"   fill="#254d2a"/>
    <path id="tree-front" fill="#1e3d22"/>
  </svg>

  <!-- Content -->
  <main class="content">

    <!-- Crosshair / scope icon -->
    <svg id="crosshair" class="logo-mark" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="36" cy="36" r="30" stroke="#4a7c4e" stroke-width="2" fill="none" opacity="0.7"/>
      <circle cx="36" cy="36" r="18" stroke="#4a7c4e" stroke-width="1.5" fill="none" opacity="0.5"/>
      <circle cx="36" cy="36" r="4"  fill="#c8a84b" opacity="0.9"/>
      <!-- crosshair lines -->
      <line x1="36" y1="6"  x2="36" y2="18" stroke="#4a7c4e" stroke-width="1.5" opacity="0.7"/>
      <line x1="36" y1="54" x2="36" y2="66" stroke="#4a7c4e" stroke-width="1.5" opacity="0.7"/>
      <line x1="6"  y1="36" x2="18" y2="36" stroke="#4a7c4e" stroke-width="1.5" opacity="0.7"/>
      <line x1="54" y1="36" x2="66" y2="36" stroke="#4a7c4e" stroke-width="1.5" opacity="0.7"/>
    </svg>

    <h1>Passipaikka</h1>

    <div class="divider"></div>

    <p class="tagline">Tulossa joskus</p>

    <div class="divider"></div>

    <p class="subtitle">passipaikka.fi</p>

  </main>

  <!-- Easter egg overlay -->
  <div id="egg" aria-hidden="true">
    <img src="naurava_hirvi.jpg" alt="">
  </div>

  <script src="script.js"></script>

</body>
</html>
