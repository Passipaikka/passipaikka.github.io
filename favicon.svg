<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Filled circle background (dark green, transparent outside) -->
  <circle cx="32" cy="32" r="30" fill="#162b18"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="26" stroke="#4a7c4e" stroke-width="2" fill="none"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="15" stroke="#4a7c4e" stroke-width="1.5" fill="none"/>
  <!-- Centre dot -->
  <circle cx="32" cy="32" r="3.5" fill="#c8a84b"/>
  <!-- Crosshair lines -->
  <line x1="32" y1="4"  x2="32" y2="15" stroke="#4a7c4e" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="49" x2="32" y2="60" stroke="#4a7c4e" stroke-width="2" stroke-linecap="round"/>
  <line x1="4"  y1="32" x2="15" y2="32" stroke="#4a7c4e" stroke-width="2" stroke-linecap="round"/>
  <line x1="49" y1="32" x2="60" y2="32" stroke="#4a7c4e" stroke-width="2" stroke-linecap="round"/>
</svg>
